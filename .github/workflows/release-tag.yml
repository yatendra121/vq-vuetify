name: Add GitHub Release Tag

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Create Release for Tag
              uses: softprops/action-gh-release@v2
              with:
                  body: |
                      Please refer to [CHANGELOG.md](https://github.com/yatendra121/vq-vuetify/blob/${{ github.ref_name }}/CHANGELOG.md) for details.
